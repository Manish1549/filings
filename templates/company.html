<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Filings — Company</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{min-height:100%}
  body{font-family:'Inter',sans-serif;background:#0a0a0a;color:#e5e7eb;font-size:14px;line-height:1.5}

  /* Subtle grid background */
  body::before{
    content:'';position:fixed;inset:0;
    background-image:linear-gradient(rgba(255,255,255,0.025) 1px,transparent 1px),
                     linear-gradient(90deg,rgba(255,255,255,0.025) 1px,transparent 1px);
    background-size:48px 48px;pointer-events:none;z-index:0
  }

  /* Top nav */
  .topnav{position:sticky;top:0;z-index:20;height:54px;padding:0 32px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.07);background:rgba(10,10,10,0.85);backdrop-filter:blur(16px)}
  .logo{display:flex;align-items:center;gap:10px;font-size:14px;font-weight:600;color:#fff;text-decoration:none;letter-spacing:-0.3px}
  .logo-ring{width:26px;height:26px;border-radius:50%;border:2px solid rgba(255,255,255,0.6);display:flex;align-items:center;justify-content:center}
  .logo-dot{width:7px;height:7px;border-radius:50%;background:#fff}
  .nav-center{display:flex;align-items:center;gap:6px}
  .nav-sep{color:rgba(255,255,255,0.2);font-size:16px;margin:0 2px}
  .nav-back{display:flex;align-items:center;gap:5px;font-size:12px;color:#6b7280;text-decoration:none;padding:5px 11px;border-radius:20px;transition:all 0.15s;border:1px solid transparent}
  .nav-back:hover{color:#d1d5db;border-color:rgba(255,255,255,0.1);background:rgba(255,255,255,0.05)}
  .nav-right{display:flex;gap:6px}
  .nav-btn{padding:5px 13px;border-radius:20px;font-size:12px;color:#6b7280;text-decoration:none;border:1px solid rgba(255,255,255,0.08);background:transparent;transition:all 0.15s;cursor:pointer;font-family:'Inter',sans-serif}
  .nav-btn:hover{color:#d1d5db;border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.06)}
  .user-pill{display:flex;align-items:center;gap:8px;padding:4px 12px 4px 4px;border-radius:20px;border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);text-decoration:none;transition:all 0.15s}
  .user-pill:hover{border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.09)}
  .user-avatar{width:24px;height:24px;border-radius:50%;object-fit:cover}
  .user-avatar-fallback{width:24px;height:24px;border-radius:50%;background:rgba(255,255,255,0.15);display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;color:#fff}
  .user-name{font-size:12px;color:#d1d5db;max-width:110px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .logout-btn{padding:5px 11px;border-radius:20px;font-size:12px;color:#6b7280;text-decoration:none;border:1px solid rgba(255,255,255,0.08);transition:all 0.15s}
  .logout-btn:hover{color:#f87171;border-color:rgba(248,113,113,0.3);background:rgba(248,113,113,0.07)}

  /* Page */
  .page{position:relative;z-index:1;max-width:1200px;margin:0 auto;padding:28px 28px 80px}

  /* Company header */
  .company-header{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.09);border-radius:16px;padding:24px 28px;margin-bottom:16px;display:flex;align-items:flex-start;justify-content:space-between;gap:20px;flex-wrap:wrap;backdrop-filter:blur(12px)}
  .company-header-left{display:flex;align-items:flex-start;gap:18px;min-width:0;flex:1}
  .company-avatar{width:52px;height:52px;border-radius:12px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
  .company-info{min-width:0}
  .company-name{font-size:22px;font-weight:600;letter-spacing:-0.5px;color:#fff;margin-bottom:8px;line-height:1.2}
  .company-meta{display:flex;align-items:center;gap:7px;flex-wrap:wrap}
  .exch-badge{display:inline-flex;align-items:center;gap:5px;padding:3px 11px;border-radius:20px;font-size:12px;font-weight:600;flex-shrink:0}
  .ticker-tag{font-size:12px;font-weight:600;color:#9ca3af;font-family:'SF Mono','Fira Mono',monospace;padding:2px 8px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:6px}
  .sector-tag{font-size:11px;color:#6b7280;padding:2px 9px;background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:6px}
  .company-header-right{display:flex;gap:10px;flex-shrink:0;align-items:flex-start}
  .co-stat{text-align:center;padding:10px 20px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);border-radius:10px;min-width:90px}
  .co-stat-val{font-size:20px;font-weight:600;color:#fff}
  .co-stat-lbl{font-size:10px;color:#4b5563;text-transform:uppercase;letter-spacing:0.5px;margin-top:2px}
  .wl-add-btn{display:inline-flex;align-items:center;gap:7px;padding:8px 18px;border-radius:10px;font-size:13px;font-weight:500;cursor:pointer;border:1px solid rgba(255,255,255,0.15);background:rgba(255,255,255,0.06);color:#d1d5db;font-family:'Inter',sans-serif;transition:all 0.15s;align-self:flex-start}
  .wl-add-btn:hover{border-color:rgba(251,191,36,0.4);color:#fbbf24;background:rgba(251,191,36,0.07)}
  .wl-add-btn.saved{border-color:rgba(251,191,36,0.4);color:#fbbf24;background:rgba(251,191,36,0.08)}

  /* Filter card */
  .filter-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:14px;padding:18px 22px;margin-bottom:16px;backdrop-filter:blur(8px);position:relative;z-index:10}
  .filter-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
  .field-group{display:flex;flex-direction:column;gap:5px}
  .field-group label{font-size:10px;font-weight:600;color:#4b5563;text-transform:uppercase;letter-spacing:0.6px}
  .field-group select,.field-group input[type=date]{
    height:36px;padding:0 11px;
    border:1px solid rgba(255,255,255,0.1);border-radius:8px;
    font-size:13px;color:#e5e7eb;background:rgba(255,255,255,0.06);
    outline:none;font-family:'Inter',sans-serif;transition:border-color 0.15s;
    appearance:auto;color-scheme:dark
  }
  .field-group select:focus,.field-group input[type=date]:focus{border-color:rgba(255,255,255,0.25)}
  .field-group select option{background:#1a1a1a;color:#e5e7eb}

  /* Multi-select dropdown */
  .multi-drop{position:relative}
  .multi-drop-btn{
    height:36px;padding:0 12px;
    border:1px solid rgba(255,255,255,0.1);border-radius:8px;
    background:rgba(255,255,255,0.06);font-size:13px;color:#d1d5db;
    cursor:pointer;display:flex;align-items:center;gap:7px;
    font-family:'Inter',sans-serif;white-space:nowrap;
    transition:all 0.15s;min-width:160px
  }
  .multi-drop-btn:hover{border-color:rgba(255,255,255,0.2);color:#fff}
  .multi-drop-btn.has-sel{border-color:rgba(255,255,255,0.3);color:#fff;font-weight:500}
  .drop-count{background:rgba(255,255,255,0.15);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:600}
  .drop-arrow{font-size:9px;color:#4b5563;margin-left:auto}
  .multi-drop-panel{
    position:absolute;top:calc(100% + 6px);left:0;
    background:#141414;border:1px solid rgba(255,255,255,0.1);border-radius:12px;
    box-shadow:0 16px 48px rgba(0,0,0,0.6);z-index:60;
    min-width:240px;max-height:280px;overflow-y:auto;
    display:none;padding:5px 0;
    scrollbar-width:thin;scrollbar-color:#333 transparent
  }
  .multi-drop-panel.open{display:block}
  .multi-drop-panel::-webkit-scrollbar{width:4px}
  .multi-drop-panel::-webkit-scrollbar-thumb{background:#333;border-radius:4px}
  .drop-group-label{padding:9px 14px 4px;font-size:10px;font-weight:600;color:#4b5563;text-transform:uppercase;letter-spacing:0.6px;border-top:1px solid rgba(255,255,255,0.06);margin-top:4px}
  .drop-group-label:first-child{border-top:none;margin-top:0}
  .drop-item{display:flex;align-items:center;gap:9px;padding:7px 14px;cursor:pointer;font-size:13px;color:#9ca3af;user-select:none;transition:background 0.08s}
  .drop-item:hover{background:rgba(255,255,255,0.05);color:#e5e7eb}
  .drop-item input[type=checkbox]{width:14px;height:14px;accent-color:#fff;cursor:pointer;flex-shrink:0}

  /* Time range pills */
  .time-range-pills{display:flex;gap:4px;flex-wrap:wrap}
  .tr-pill{
    padding:5px 12px;border-radius:8px;
    border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.04);
    font-size:12px;color:#6b7280;cursor:pointer;
    transition:all 0.12s;white-space:nowrap;font-family:'Inter',sans-serif
  }
  .tr-pill:hover{border-color:rgba(255,255,255,0.2);color:#d1d5db}
  .tr-pill.active{background:rgba(255,255,255,0.12);border-color:rgba(255,255,255,0.3);color:#fff;font-weight:500}

  /* Buttons */
  .btn{
    height:36px;padding:0 18px;border-radius:8px;font-size:13px;font-weight:500;
    cursor:pointer;border:none;background:#fff;color:#000;
    font-family:'Inter',sans-serif;transition:opacity 0.15s;white-space:nowrap
  }
  .btn:hover{opacity:0.85}
  .btn-ghost{background:rgba(255,255,255,0.06);color:#9ca3af;border:1px solid rgba(255,255,255,0.1)}
  .btn-ghost:hover{background:rgba(255,255,255,0.1);color:#d1d5db;opacity:1}
  .ps-toggle{
    display:flex;align-items:center;gap:7px;font-size:13px;color:#9ca3af;
    cursor:pointer;height:36px;padding:0 4px;white-space:nowrap;user-select:none;transition:color 0.15s
  }
  .ps-toggle:hover{color:#d1d5db}
  .ps-toggle input{width:14px;height:14px;accent-color:#fff;cursor:pointer}

  /* Filings table card */
  .table-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.08);border-radius:14px;overflow:hidden;backdrop-filter:blur(8px)}
  .table-head-row{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid rgba(255,255,255,0.07);background:rgba(255,255,255,0.02)}
  .table-head-title{font-size:13px;font-weight:500;color:#9ca3af}
  .table-actions{display:flex;gap:6px}
  table{width:100%;border-collapse:collapse}
  thead tr{border-bottom:1px solid rgba(255,255,255,0.07)}
  th{padding:9px 14px;text-align:left;font-size:10px;font-weight:600;color:#4b5563;text-transform:uppercase;letter-spacing:0.5px;white-space:nowrap;background:rgba(255,255,255,0.02)}
  tbody tr{border-bottom:1px solid rgba(255,255,255,0.05);transition:background 0.1s}
  tbody tr:last-child{border-bottom:none}
  tbody tr:hover{background:rgba(255,255,255,0.04)}
  td{padding:12px 14px;font-size:13px;vertical-align:middle;color:#d1d5db}
  .td-title{max-width:340px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-weight:500;color:#f0f0f0}
  .td-company{color:#6b7280;max-width:160px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .td-date{color:#4b5563;white-space:nowrap;font-size:12px}

  /* Badges */
  .badge{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:500;white-space:nowrap}
  .badge-sg{background:rgba(220,38,38,0.15);color:#f87171}
  .badge-au{background:rgba(234,179,8,0.15);color:#fbbf24}
  .badge-us{background:rgba(59,130,246,0.15);color:#60a5fa}
  .badge-type{background:rgba(255,255,255,0.08);color:#9ca3af}
  .badge-xbrl{background:rgba(34,197,94,0.15);color:#4ade80}
  .badge-sensitive{background:rgba(239,68,68,0.15);color:#f87171}
  .badge-jp{background:rgba(236,72,153,0.15);color:#f472b6}
  .badge-uk{background:rgba(139,92,246,0.15);color:#a78bfa}

  /* Action buttons */
  .action-btn{
    padding:4px 11px;border-radius:6px;
    border:1px solid rgba(255,255,255,0.1);background:rgba(255,255,255,0.05);
    font-size:12px;cursor:pointer;color:#9ca3af;
    font-family:'Inter',sans-serif;transition:all 0.1s;white-space:nowrap
  }
  .action-btn:hover{background:rgba(255,255,255,0.1);color:#e5e7eb;border-color:rgba(255,255,255,0.2)}

  /* Pagination */
  .pagination{display:flex;align-items:center;justify-content:space-between;padding:13px 18px;border-top:1px solid rgba(255,255,255,0.07)}
  .pagination-info{font-size:12px;color:#4b5563}
  .pagination-btns{display:flex;gap:6px}
  .page-btn{
    padding:5px 13px;border:1px solid rgba(255,255,255,0.1);border-radius:8px;
    background:rgba(255,255,255,0.04);font-size:12px;cursor:pointer;
    color:#6b7280;font-family:'Inter',sans-serif;transition:all 0.12s
  }
  .page-btn:hover{background:rgba(255,255,255,0.08);color:#d1d5db;border-color:rgba(255,255,255,0.18)}
  .page-btn:disabled{opacity:0.25;cursor:not-allowed}

  /* States */
  @keyframes spin{to{transform:rotate(360deg)}}
  .spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(255,255,255,0.1);border-top-color:rgba(255,255,255,0.4);border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:6px}

  /* Toast */
  .toast{position:fixed;bottom:24px;right:24px;background:rgba(255,255,255,0.1);backdrop-filter:blur(16px);color:#fff;border:1px solid rgba(255,255,255,0.15);padding:10px 18px;border-radius:10px;font-size:13px;transform:translateY(80px);opacity:0;transition:all 0.25s;z-index:100}
  .toast.show{transform:translateY(0);opacity:1}
</style>
</head>
<body>

<!-- Top nav -->
<nav class="topnav">
  <div style="display:flex;align-items:center;gap:14px">
    <a class="logo" href="/">
      <div class="logo-ring"><div class="logo-dot"></div></div>
      Global Filings
    </a>
    <span class="nav-sep">/</span>
    <a class="nav-back" href="/">← Search</a>
  </div>
  <div class="nav-right" style="display:flex;align-items:center;gap:8px">
    <a class="nav-btn" href="/dashboard">Dashboard</a>
    <a class="nav-btn" href="/docs" target="_blank">API ↗</a>
    <button class="nav-btn" id="wl-btn" onclick="toggleWatchlist()" style="display:none">☆ Watchlist</button>
    {% if user %}
      {% if user.picture %}
        <a class="user-pill" href="/logout" title="Sign out">
          <img class="user-avatar" src="{{ user.picture }}" referrerpolicy="no-referrer">
          <span class="user-name">{{ user.name or user.email }}</span>
        </a>
      {% else %}
        <a class="user-pill" href="/logout" title="Sign out">
          <div class="user-avatar-fallback">{{ (user.name or user.email or '?')[0].upper() }}</div>
          <span class="user-name">{{ user.name or user.email }}</span>
        </a>
      {% endif %}
      <a class="logout-btn" href="/logout">Sign out</a>
    {% endif %}
  </div>
</nav>

<div class="page">

  <!-- Company header -->
  <div class="company-header" id="company-header">
    <div class="company-header-left">
      <div class="company-avatar" id="co-avatar">—</div>
      <div class="company-info">
        <div class="company-name" id="co-name">Loading…</div>
        <div class="company-meta" id="co-meta"></div>
      </div>
    </div>
    <div class="company-header-right" id="co-stats"></div>
    <button class="wl-add-btn" id="wl-header-btn" onclick="toggleWatchlist()" style="display:none">
      <span id="wl-header-icon">☆</span> <span id="wl-header-label">Add to Watchlist</span>
    </button>
  </div>

  <!-- Filters -->
  <div class="filter-card" id="filter-card">
    <div class="filter-row" id="filter-row">
      <span style="color:#4b5563;font-size:13px">Loading filters…</span>
    </div>
  </div>

  <!-- Filings table -->
  <div class="table-card">
    <div class="table-head-row">
      <span class="table-head-title" id="table-title">Filings</span>
      <div class="table-actions">
        <button class="action-btn" onclick="exportCSV()">Export CSV</button>
      </div>
    </div>
    <div style="overflow-x:auto">
      <table>
        <thead><tr id="table-head"></tr></thead>
        <tbody id="table-body">
          <tr><td colspan="8" style="text-align:center;padding:48px;color:#4b5563"><span class="spinner"></span>Loading filings…</td></tr>
        </tbody>
      </table>
    </div>
    <div class="pagination">
      <span class="pagination-info" id="pagination-info"></span>
      <div class="pagination-btns">
        <button class="page-btn" id="btn-prev" onclick="changePage(-1)" disabled>← Prev</button>
        <button class="page-btn" id="btn-next" onclick="changePage(1)" disabled>Next →</button>
      </div>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
// ── URL params ─────────────────────────────────────────────────────────────────
const params       = new URLSearchParams(location.search);
const COMPANY_NAME = params.get('name')           || '';
const EXCHANGE     = params.get('exchange')        || '';
const LOOKUP_KEY   = params.get('lookup_key')      || '';
const LOOKUP_TYPE  = params.get('lookup_type')     || '';
const TICKER       = params.get('ticker')          || '';
const SYMBOL       = params.get('symbol')          || '';
const SECTOR       = params.get('sector')          || '';
const FLAG         = params.get('flag')             || '';
const EXCH_LABEL   = params.get('exchange_label')  || EXCHANGE.toUpperCase();

const PAGE_SIZE = 20;
let currentPage  = 0;
let totalFilings = 0;

// ── Exchange colors (dark-mode palette) ────────────────────────────────────────
const EXCH_COLORS = {
  edgar:  { bg:'rgba(59,130,246,0.18)',  text:'#60a5fa' },
  edinet: { bg:'rgba(236,72,153,0.18)',  text:'#f472b6' },
  sgx:    { bg:'rgba(239,68,68,0.18)',   text:'#f87171' },
  asx:    { bg:'rgba(234,179,8,0.18)',   text:'#fbbf24' },
  fca:    { bg:'rgba(139,92,246,0.18)',  text:'#a78bfa' },
  europe: { bg:'rgba(37,99,235,0.18)',   text:'#93c5fd' },
};

// ── Render company header ──────────────────────────────────────────────────────
function renderHeader() {
  document.title = COMPANY_NAME + ' — Global Filings';
  document.getElementById('co-avatar').textContent = FLAG || COMPANY_NAME.charAt(0).toUpperCase();

  document.getElementById('co-name').textContent = COMPANY_NAME;

  const col = EXCH_COLORS[EXCHANGE] || { bg:'rgba(255,255,255,0.08)', text:'#9ca3af' };
  let meta = `<span class="exch-badge" style="background:${col.bg};color:${col.text}">${FLAG} ${EXCH_LABEL}</span>`;
  if (TICKER) meta += `<span class="ticker-tag">${TICKER}</span>`;
  if (SECTOR) meta += `<span class="sector-tag">${SECTOR}</span>`;
  document.getElementById('co-meta').innerHTML = meta;
}

// ── Static filter data ─────────────────────────────────────────────────────────
const ASX_ANN_TYPES = [
  'annual report','half-yearly report','issued capital','periodic reports',
  'security holder details','progress report','company administration',
  'notice of meeting','asx announcement','distribution announcement',
  'quarterly activities report','quarterly cash flow report',
  'other','asset acquisition & disposal',"chairman's address",
  'letter to shareholders','takeover announcements/scheme announcements',
];

let sgxCategoryGroups = [];
let edgarFormTypes    = [];
let edinetDocTypes    = [];
let fcaCategories     = [];

// ── Time range ─────────────────────────────────────────────────────────────────
let activeTimeRange = '1y';

function applyTimeRange(val) {
  activeTimeRange = val;
  document.querySelectorAll('.tr-pill').forEach(p => p.classList.toggle('active', p.dataset.val === val));
  currentPage = 0;
  doSearch();
}

function dateFromRange(val) {
  if (val === 'allTime') return { from: '', to: '' };
  const today = new Date();
  const to = today.toISOString().split('T')[0];
  const d  = new Date(today);
  if      (val === '3m') d.setMonth(d.getMonth() - 3);
  else if (val === '6m') d.setMonth(d.getMonth() - 6);
  else if (val === '1y') d.setFullYear(d.getFullYear() - 1);
  else if (val === '2y') d.setFullYear(d.getFullYear() - 2);
  else if (val === '3y') d.setFullYear(d.getFullYear() - 3);
  else if (val === '5y') d.setFullYear(d.getFullYear() - 5);
  return { from: d.toISOString().split('T')[0], to };
}

function trPillsHtml(defaultVal='1y') {
  return ['3m','6m','1y','2y','3y','5y','allTime'].map(v =>
    `<button class="tr-pill${v===defaultVal?' active':''}" data-val="${v}" onclick="applyTimeRange('${v}')" type="button">${v==='allTime'?'All':v}</button>`
  ).join('');
}

// ── Build exchange-specific filter UI ──────────────────────────────────────────
async function buildFilters() {
  const row = document.getElementById('filter-row');

  if (EXCHANGE === 'sgx') {
    try {
      const data = await fetch('/api/sgx/categories').then(r => r.json());
      sgxCategoryGroups = data.groups || [];
    } catch(e) {}

    const catPanelHtml = sgxCategoryGroups.map(g =>

// ── Dropdown helpers ───────────────────────────────────────────────────────────
function toggleDrop(dropId) {
  const panel = document.querySelector(`#${dropId} .multi-drop-panel`);
  const isOpen = panel.classList.contains('open');
  document.querySelectorAll('.multi-drop-panel.open').forEach(p => p.classList.remove('open'));
  if (!isOpen) panel.classList.add('open');
}

function updateDropCount(key) {
  const cnt   = document.querySelectorAll(`#panel-${key} input:checked`).length;
  const cntEl = document.getElementById(`cnt-${key}`);
  const btnEl = document.getElementById(`btn-${key}`);
  if (!cntEl || !btnEl) return;
  cntEl.textContent = cnt;
  cntEl.style.display = cnt > 0 ? '' : 'none';
  btnEl.classList.toggle('has-sel', cnt > 0);
}

function resetAsxFilters() {
  document.querySelectorAll('#filter-row input[type=checkbox]').forEach(c => c.checked = false);
  updateDropCount('ann');
  currentPage = 0;
  doSearch();
}

document.addEventListener('click', e => {
  if (!e.target.closest('.multi-drop'))
    document.querySelectorAll('.multi-drop-panel.open').forEach(p => p.classList.remove('open'));
});

// ── Build API URL ──────────────────────────────────────────────────────────────
function buildUrl(page) {
  const p = new URLSearchParams({ page, page_size: PAGE_SIZE });

  if (EXCHANGE === 'sgx') {
    if (LOOKUP_KEY) p.set('company', LOOKUP_KEY);
    const cats = [...document.querySelectorAll('#panel-sgx-cat input:checked')].map(c => c.value);
    if (cats.length) p.set('cat', cats.join(','));
    const { from, to } = dateFromRange(activeTimeRange);
    if (from) p.set('from_date', from.replaceAll('-',''));
    if (to)   p.set('to_date',   to.replaceAll('-',''));
    return `/api/sgx/filings?${p}`;
  }

  if (EXCHANGE === 'asx') {
    if (LOOKUP_TYPE === 'asx_xid') {
      p.set('entity_xid', LOOKUP_KEY);
    } else if (TICKER) {
      return `/api/asx/filings/${encodeURIComponent(TICKER)}?${p}`;
    }
    const { from, to } = dateFromRange(activeTimeRange);
    if (from) p.set('from_date', from);
    if (to)   p.set('to_date',   to);
    document.querySelectorAll('#panel-ann input:checked').forEach(c => p.append('announcement_types', c.value));
    if (document.getElementById('asx-ps')?.checked) p.set('price_sensitive', 'true');
    return `/api/asx/market?${p}`;
  }

  if (EXCHANGE === 'edgar') {
    const ticker = TICKER || LOOKUP_KEY;
    if (!ticker) return null;
    const form = document.getElementById('edgar-form')?.value;
    if (form) p.set('form_type', form);
    return `/api/edgar/filings/${encodeURIComponent(ticker.toUpperCase())}?${p}`;
  }

  if (EXCHANGE === 'edinet') {
    const to   = document.getElementById('edinet-to')?.value   || new Date().toISOString().split('T')[0];
    const from = document.getElementById('edinet-from')?.value || '';
    const doc  = document.getElementById('edinet-doctype')?.value || '';
    p.set('date', to);
    p.set('company', COMPANY_NAME);
    if (doc)  p.set('doc_type', doc);
    if (from) p.set('from_date', from);
    return `/api/edinet/filings?${p}`;
  }

  if (EXCHANGE === 'fca') {
    p.set('company', COMPANY_NAME);
    const cat  = document.getElementById('fca-cat')?.value;
    const from = document.getElementById('fca-from')?.value;
    const to   = document.getElementById('fca-to')?.value;
    if (cat)  p.set('category', cat);
    if (from) p.set('from_date', from);
    if (to)   p.set('to_date', to);
    return `/api/fca/filings?${p}`;
  }

  if (EXCHANGE === 'europe') {
    if (LOOKUP_KEY) p.set('company', LOOKUP_KEY);
    const from = document.getElementById('eu-from')?.value;
    const to   = document.getElementById('eu-to')?.value;
    const lang = document.getElementById('eu-lang')?.value;
    if (from) p.set('from_date', from);
    if (to)   p.set('to_date', to);
    if (lang) p.set('language', lang);
    return `/api/europe/filings?${p}`;
  }

  return null;
}

function renderTableHead() {

  if (!cfg) return;
  document.getElementById('table-head').innerHTML = cfg.columns.map(c => `<th>${c}</th>`).join('');

// ── Render filings ─────────────────────────────────────────────────────────────
let lastFilings = [];

function renderFilings(filings, page, total) {
  lastFilings = filings;
  const cfg  = TABLE_CONFIG[EXCHANGE];
  const body = document.getElementById('table-body');
  const cols = (cfg?.columns||[]).length || 6;

  if (!filings.length) {
    body.innerHTML = `<tr><td colspan="${cols}" style="text-align:center;padding:56px 20px;color:#4b5563">
      <div style="font-size:28px;margin-bottom:10px">📄</div>
      <div style="font-size:14px;font-weight:500;color:#6b7280;margin-bottom:4px">No filings found</div>
      <div style="font-size:12px">Try adjusting the filters or expanding the time range</div>
    </td></tr>`;
    document.getElementById('pagination-info').textContent = '';
    document.getElementById('btn-prev').disabled = true;
    document.getElementById('btn-next').disabled = true;
    return;
  }

  body.innerHTML = filings.map(f => `<tr>${cfg.renderRow(f)}</tr>`).join('');

  const start = page * PAGE_SIZE + 1;
  const end   = page * PAGE_SIZE + filings.length;
  document.getElementById('pagination-info').textContent =
    total > 0 ? `Showing ${start}–${end} of ${total.toLocaleString()}` : `Showing ${start}–${end}`;

  document.getElementById('btn-prev').disabled = page <= 0;
  document.getElementById('btn-next').disabled = filings.length < PAGE_SIZE;

  updateStats(total || filings.length);
}

function updateStats(count) {
  const col = EXCH_COLORS[EXCHANGE] || { bg:'rgba(255,255,255,0.08)', text:'#9ca3af' };
  document.getElementById('co-stats').innerHTML = `
    <div class="co-stat" style="border-color:${col.bg}">
      <div class="co-stat-val" style="color:${col.text}">${count.toLocaleString()}</div>
      <div class="co-stat-lbl">Filings</div>
    </div>`;
}

// ── Main search ────────────────────────────────────────────────────────────────
async function doSearch(page) {
  if (page !== undefined) currentPage = page;
  const url  = buildUrl(currentPage);
  const cols = (TABLE_CONFIG[EXCHANGE]?.columns||[]).length || 6;

  if (!url) {
    document.getElementById('table-body').innerHTML = `<tr><td colspan="${cols}" style="text-align:center;padding:40px;color:#4b5563">Cannot build search URL — missing company identifier.</td></tr>`;
    return;
  }

  document.getElementById('table-body').innerHTML = `<tr><td colspan="${cols}" style="text-align:center;padding:48px;color:#4b5563"><span class="spinner"></span>Loading…</td></tr>`;
  document.getElementById('btn-prev').disabled = true;
  document.getElementById('btn-next').disabled = true;

  try {
    const data = await fetch(url).then(r => r.json());

    let filings = [];
    if (EXCHANGE === 'sgx')    { filings = data.filings||data.items||data||[]; totalFilings = data.total_items||data.total||0; }
    if (EXCHANGE === 'asx')    { filings = data.filings||data.items||data||[]; totalFilings = data.total_items||data.total||0; }
    if (EXCHANGE === 'edgar')  { filings = data.filings||data||[];              totalFilings = data.total||filings.length; }
    if (EXCHANGE === 'edinet') { filings = data.filings||data.documents||data||[]; totalFilings = data.total||filings.length; }
    if (EXCHANGE === 'fca')    { filings = data.filings||data.items||data||[]; totalFilings = data.total||filings.length; }
    if (EXCHANGE === 'europe') { filings = data.filings||data.results||data||[]; totalFilings = data.total||data.count||filings.length; }

    // EDINET: filter by company name client-side
    if (EXCHANGE === 'edinet' && COMPANY_NAME) {
      const q = COMPANY_NAME.toLowerCase();
      filings = filings.filter(f =>
        (f.filer_name||'').toLowerCase().includes(q) ||
        (f.filer_name_en||'').toLowerCase().includes(q)
      );
      totalFilings = filings.length;
      const start = currentPage * PAGE_SIZE;
      filings = filings.slice(start, start + PAGE_SIZE);
    }

    renderFilings(filings, currentPage, totalFilings);
  } catch(e) {
    document.getElementById('table-body').innerHTML =
      `<tr><td colspan="${cols}" style="text-align:center;padding:40px;color:#f87171">Error: ${e.message}</td></tr>`;
  }
}

function changePage(delta) {
  const newPage = currentPage + delta;
  if (newPage < 0) return;
  doSearch(newPage);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── Export CSV ─────────────────────────────────────────────────────────────────
function exportCSV() {
  const cfg = TABLE_CONFIG[EXCHANGE];
  if (!cfg || !lastFilings.length) { showToast('No filings to export'); return; }
  const rows = [cfg.csvHeader, ...lastFilings.map(f => cfg.csvRow(f))];
  const blob = new Blob([rows.join('\n')], { type: 'text/csv' });
  const a = Object.assign(document.createElement('a'), {
    href: URL.createObjectURL(blob),
    download: `${COMPANY_NAME.replace(/\s+/g,'_')}_${EXCHANGE}.csv`,
  });
  a.click();
  showToast('CSV downloaded');
}

// ── Toast ──────────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2400);
}

// ── Helpers ────────────────────────────────────────────────────────────────────
function esc(s)  { return `"${(s||'').replace(/"/g,'""')}"` }
function esc2(s) { return (s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;') }

// ── Init ───────────────────────────────────────────────────────────────────────
(async function init() {
  if (!COMPANY_NAME || !EXCHANGE) {
    document.getElementById('co-name').textContent = 'Company not found';
    document.getElementById('filter-card').style.display = 'none';
    document.getElementById('table-body').innerHTML =
      `<tr><td colspan="6" style="text-align:center;padding:48px;color:#4b5563">No company selected. <a href="/" style="color:#60a5fa">Go back to search</a></td></tr>`;
    return;
  }
  renderHeader();
  renderTableHead();
  await buildFilters();
  doSearch(0);

  // ── Watchlist ──────────────────────────────────────────────────────────────
  const wlBtn = document.getElementById('wl-btn');
  const wlHeaderBtn = document.getElementById('wl-header-btn');
  const wlHeaderIcon = document.getElementById('wl-header-icon');
  const wlHeaderLabel = document.getElementById('wl-header-label');
  if (LOOKUP_KEY) {
    if (wlBtn) wlBtn.style.display = 'inline-block';
    if (wlHeaderBtn) wlHeaderBtn.style.display = 'inline-flex';
    let wlId = null;

    function _applyWlState() {
      const saved = !!wlId;
      if (wlBtn) {
        wlBtn.textContent = saved ? '★ Saved' : '☆ Watchlist';
        wlBtn.style.color = saved ? '#fbbf24' : '';
        wlBtn.style.borderColor = saved ? 'rgba(251,191,36,0.3)' : '';
      }
      if (wlHeaderBtn) {
        wlHeaderIcon.textContent = saved ? '★' : '☆';
        wlHeaderLabel.textContent = saved ? 'Saved to Watchlist' : 'Add to Watchlist';
        wlHeaderBtn.classList.toggle('saved', saved);
      }
    }

    async function syncWlBtn() {
      try {
        const items = await fetch('/api/watchlist').then(r => r.json());
        const found = Array.isArray(items) ? items.find(w => w.exchange === EXCHANGE && w.lookup_key === LOOKUP_KEY) : null;
        wlId = found ? found.id : null;
        _applyWlState();
      } catch(e) {}
    }

    window.toggleWatchlist = async function() {
      if (wlId) {
        await fetch(`/api/watchlist/${wlId}`, { method: 'DELETE' });
        wlId = null;
      } else {
        const res = await fetch('/api/watchlist', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ exchange: EXCHANGE, lookup_key: LOOKUP_KEY, name: COMPANY_NAME, ticker: TICKER || null }),
        });
        if (res.ok) { const item = await res.json(); wlId = item.id; }
      }
      _applyWlState();
    };

    syncWlBtn();
  }
})();
</script>
